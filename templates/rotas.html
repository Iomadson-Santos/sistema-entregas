<!DOCTYPE html>
<html>

<head>

<title>Roteirização</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Entregas por Bairro</h2>

<table class="table">

<tr>

<th>Bairro</th>
<th>Quantidade</th>

</tr>

{% for bairro, quantidade in rotas.items() %}

<tr>

<td>{{bairro}}</td>
<td>{{quantidade}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
