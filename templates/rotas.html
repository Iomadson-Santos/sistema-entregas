<!DOCTYPE html>
<html>

<body>

<h1>Roteirização de entregas</h1>

<a href="/">Voltar</a>

<hr>

{% for motorista,lista in rotas.items() %}

<h2>{{motorista}}</h2>

<table border="1">

<tr>
<th>NF</th>
<th>Cliente</th>
<th>Endereço</th>
<th>Status</th>
</tr>

{% for e in lista %}

<tr>

<td>{{e.nf}}</td>
<td>{{e.cliente}}</td>
<td>{{e.endereco}}</td>
<td>{{e.status}}</td>

</tr>

{% endfor %}

</table>

{% endfor %}

</body>

</html>
