<!DOCTYPE html>
<html>

<head>

<title>Painel do Motorista</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Entregas</h2>

<table class="table">

<tr>

<th>Cliente</th>
<th>Bairro</th>
<th>Status</th>
<th></th>

</tr>

{% for e in entregas %}

<tr>

<td>{{e.cliente}}</td>
<td>{{e.bairro}}</td>
<td>{{e.status}}</td>

<td>

<a href="/status/{{e.id}}" class="btn btn-success btn-sm">Atualizar</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
