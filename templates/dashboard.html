<!DOCTYPE html>
<html>

<head>

<title>Painel de Entregas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-light">

<div class="container mt-4">

<h1>Painel de Entregas</h1>

<a href="/cadastro" class="btn btn-primary">Nova Entrega</a>

<a href="/exportar" class="btn btn-success">Exportar Excel</a>

<input type="text" id="busca" class="form-control mt-3" placeholder="Buscar entrega">

<table class="table table-striped mt-3">

<thead>

<tr>

<th>Cliente</th>
<th>Bairro</th>
<th>Motorista</th>
<th>Status</th>
<th>Data</th>
<th>Ações</th>

</tr>

</thead>

<tbody>

{% for entrega in entregas %}

<tr>

<td>{{entrega.cliente}}</td>
<td>{{entrega.bairro}}</td>
<td>{{entrega.motorista}}</td>
<td>{{entrega.status}}</td>
<td>{{entrega.data}}</td>

<td>

<a href="/status/{{entrega.id}}" class="btn btn-sm btn-primary">Status</a>

<a href="/editar/{{entrega.id}}" class="btn btn-sm btn-warning">Editar</a>

<a href="/excluir/{{entrega.id}}" class="btn btn-sm btn-danger">Excluir</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<h3>Entregas por motorista</h3>

<canvas id="grafico"></canvas>

<h3 class="mt-5">Mapa</h3>

<div id="mapa" style="height:400px;"></div>

</div>

<script>

const busca = document.getElementById("busca")

busca.addEventListener("keyup", function(){

let filtro = busca.value.toLowerCase()

let linhas = document.querySelectorAll("tbody tr")

linhas.forEach(function(linha){

let texto = linha.innerText.toLowerCase()

linha.style.display = texto.includes(filtro) ? "" : "none"

})

})

var ctx = document.getElementById('grafico').getContext('2d')

new Chart(ctx, {

type: 'bar',

data: {

labels: {{nomes|tojson}},

datasets: [{
label: 'Entregas',
data: {{quantidades|tojson}}
}]

}

})

var mapa = L.map('mapa').setView([-23.55, -46.63], 10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa)

</script>

</body>

</html>
